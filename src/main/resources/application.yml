spring:
  application:
    name: db-benchmark
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:bench-mysql}

  data:
    mongodb:
      uri: ${BENCH_MONGO_URI:mongodb://localhost:27017/db_benchmark}

  sql:
    init:
      mode: always
      encoding: UTF-8
      continue-on-error: true

  jpa:
    hibernate:
      ddl-auto: none

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: db-benchmark

server:
  port: ${SERVER_PORT:8090}
