spring:
  datasource:
    url: ${BENCH_POSTGRES_URL:jdbc:postgresql://localhost:5432/db_benchmark}
    username: ${BENCH_POSTGRES_USERNAME:postgres}
    password: ${BENCH_POSTGRES_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${BENCH_DB_POOL_MAX:30}
      minimum-idle: ${BENCH_DB_POOL_MIN:5}
      connection-timeout: 5000

  sql:
    init:
      schema-locations: classpath:sql/postgres/schema.sql
      data-locations: classpath:sql/postgres/data.sql
